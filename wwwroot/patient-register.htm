<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Bệnh Nhân - Blood Bank Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .register-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .patient-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .patient-badge {
            background: #28a745;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-row.single {
            gap: 0;
        }

        .form-group {
            flex: 1;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .register-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-bottom: 20px;
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .register-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .links {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .links a {
            color: #667eea;
            text-decoration: none;
            margin: 0 10px;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .info-box {
            background: #e7f3ff;
            border: 1px solid #b8daff;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .info-box h4 {
            color: #004085;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .info-box p {
            color: #004085;
            margin: 0;
            font-size: 14px;
        }

        .required {
            color: #dc3545;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="register-container">
            <div class="logo">
                <div class="patient-icon">👨‍⚕️</div>
                <h1>🏥 Blood Bank Manager</h1>
                <p>Đăng ký tài khoản bệnh nhân</p>
                <div class="patient-badge">ĐĂNG KÝ BỆNH NHÂN</div>
            </div>

            <div class="info-box">
                <h4>📋 Thông tin cần thiết</h4>
                <p>Vui lòng điền đầy đủ thông tin để tạo tài khoản bệnh nhân. Tất cả các trường có dấu <span
                        class="required">*</span> là bắt buộc.</p>
            </div>

            <form id="patientForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email <span class="required">*</span>:</label>
                        <input type="email" id="email" name="email" required placeholder="benhnhan@email.com">
                    </div>
                    <div class="form-group">
                        <label for="password">Mật khẩu <span class="required">*</span>:</label>
                        <input type="password" id="password" name="password" required placeholder="Ít nhất 6 ký tự">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="fullName">Họ và tên <span class="required">*</span>:</label>
                        <input type="text" id="fullName" name="fullName" required placeholder="Trần Thị Bình">
                    </div>
                    <div class="form-group">
                        <label for="patientCode">Mã bệnh nhân:</label>
                        <input type="text" id="patientCode" name="patientCode"
                            placeholder="BN001 (tự động tạo nếu để trống)">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="bloodType">Nhóm máu <span class="required">*</span>:</label>
                        <select id="bloodType" name="bloodTypeId" required>
                            <option value="">Chọn nhóm máu</option>
                            <option value="1">O âm (O-)</option>
                            <option value="2">O dương (O+)</option>
                            <option value="3">A âm (A-)</option>
                            <option value="4">A dương (A+)</option>
                            <option value="5">B âm (B-)</option>
                            <option value="6">B dương (B+)</option>
                            <option value="7">AB âm (AB-)</option>
                            <option value="8">AB dương (AB+)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="dateOfBirth">Ngày sinh <span class="required">*</span>:</label>
                        <input type="date" id="dateOfBirth" name="dateOfBirth" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="gender">Giới tính:</label>
                        <select id="gender" name="gender">
                            <option value="">Chọn giới tính</option>
                            <option value="Nam">Nam</option>
                            <option value="Nữ">Nữ</option>
                            <option value="Khác">Khác</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="phoneNumber">Số điện thoại:</label>
                        <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="0123456789">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="hospital">Bệnh viện <span class="required">*</span>:</label>
                        <input type="text" id="hospital" name="hospital" required placeholder="Bệnh viện Việt Đức">
                    </div>
                    <div class="form-group">
                        <label for="ward">Khoa/Phòng <span class="required">*</span>:</label>
                        <input type="text" id="ward" name="ward" required placeholder="Khoa Nội">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="admissionDate">Ngày nhập viện <span class="required">*</span>:</label>
                        <input type="date" id="admissionDate" name="admissionDate" required>
                    </div>
                    <div class="form-group">
                        <label for="medicalCondition">Tình trạng bệnh <span class="required">*</span>:</label>
                        <input type="text" id="medicalCondition" name="medicalCondition" required
                            placeholder="Thiếu máu, chấn thương,...">
                    </div>
                </div>

                <button type="submit" class="register-btn" id="patientBtn">
                    <span id="patientBtnText">Đăng Ký Tài Khoản Bệnh Nhân</span>
                </button>
            </form>

            <div id="message" class="message"></div>
        </div>

        <div class="links">
            <a href="index.htm">Quay lại trang chủ</a>
            <a href="patient-login.htm">Đã có tài khoản? Đăng nhập</a>
            <a href="register.htm">Đăng ký nhân viên</a>
        </div>
    </div>

    <script>
        const API_BASE = (function () {
            // Use same origin if served from the backend, otherwise fall back to localhost
            if (window.location.protocol === 'file:' || !window.location.host) {
                return 'http://localhost:5000/api';
            }
            return `${window.location.protocol}//${window.location.host}/api`;
        })();

        const BLOOD_TYPE_NAMES = {
            1: 'O-',
            2: 'O+',
            3: 'A-',
            4: 'A+',
            5: 'B-',
            6: 'B+',
            7: 'AB-',
            8: 'AB+'
        };

        // Patient registration
        document.getElementById('patientForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const btn = document.getElementById('patientBtn');
            const btnText = document.getElementById('patientBtnText');

            // Show loading state
            btn.disabled = true;
            btnText.textContent = 'Đang đăng ký...';
            const loading = document.createElement('div');
            loading.className = 'loading';
            btn.appendChild(loading);

            try {
                const formData = new FormData(document.getElementById('patientForm'));
                const data = Object.fromEntries(formData.entries());

                // Convert date strings to ISO format
                if (data.dateOfBirth) {
                    data.dateOfBirth = new Date(data.dateOfBirth).toISOString();
                }
                if (data.admissionDate) {
                    data.admissionDate = new Date(data.admissionDate).toISOString();
                }

                const response = await fetch(`${API_BASE}/account/register/patient`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    // Save to local cache so the patient list updates immediately (even if API caching delays)
                    cacheRegisteredPatient(data);

                    showMessage('Đăng ký bệnh nhân thành công! Vui lòng sử dụng liên kết bên dưới để đăng nhập.', 'success');
                    document.getElementById('patientForm').reset();

                    // Redirect back to homepage where the patient list is shown
                    setTimeout(() => {
                        window.location.href = 'index.htm';
                    }, 800);
                } else {
                    showMessage(result.message || 'Đăng ký thất bại!', 'error');
                }
            } catch (error) {
                console.error('Registration error:', error);
                const errText = error && error.message ? error.message : 'Lỗi kết nối. Vui lòng thử lại!';
                showMessage(errText, 'error');
            } finally {
                // Reset button state
                btn.disabled = false;
                btnText.textContent = 'Đăng Ký Tài Khoản Bệnh Nhân';
                const loadingElement = btn.querySelector('.loading');
                if (loadingElement) {
                    btn.removeChild(loadingElement);
                }
            }
        });

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';

            // Auto hide after 5 seconds
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        function cacheRegisteredPatient(formData) {
            try {
                const existing = JSON.parse(localStorage.getItem('localPatients') || '[]');
                const bloodTypeId = parseInt(formData.bloodTypeId) || null;
                const newPatient = {
                    id: Date.now(),
                    name: formData.fullName || formData.fullname || '',
                    bloodType: BLOOD_TYPE_NAMES[bloodTypeId] || '',
                    bloodTypeId: bloodTypeId,
                    dateOfBirth: formData.dateOfBirth || null,
                    underTreatment: false
                };

                // Avoid duplicates by email
                const updated = existing.filter(p => p.email !== formData.email);
                updated.push({ ...newPatient, email: formData.email });

                localStorage.setItem('localPatients', JSON.stringify(updated));

                // Notify other tabs/pages that patients list changed
                localStorage.setItem('localPatientsUpdatedAt', new Date().toISOString());
            } catch (err) {
                console.warn('Unable to cache patient locally:', err);
            }
        }

        // Set default dates
        document.addEventListener('DOMContentLoaded', function () {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('admissionDate').value = today;

            // Set max date for dateOfBirth (18 years ago)
            const eighteenYearsAgo = new Date();
            eighteenYearsAgo.setFullYear(eighteenYearsAgo.getFullYear() - 18);
            document.getElementById('dateOfBirth').max = eighteenYearsAgo.toISOString().split('T')[0];
        });
    </script>
</body>

</html>
