<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Bệnh Nhân - Blood Bank Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 24px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info span {
            color: #666;
        }

        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn:hover {
            background: #c82333;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .card p {
            margin-bottom: 10px;
            color: #666;
        }

        .card .value {
            font-weight: bold;
            color: #333;
            font-size: 16px;
        }

        .transfusion-history {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .transfusion-history h3 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .transfusion-item {
            border-bottom: 1px solid #eee;
            padding: 15px 0;
        }

        .transfusion-item:last-child {
            border-bottom: none;
        }

        .transfusion-date {
            font-weight: bold;
            color: #333;
        }

        .transfusion-details {
            color: #666;
            margin-top: 5px;
        }

        .no-data {
            text-align: center;
            color: #666;
            padding: 40px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }

        .patient-badge {
            background: #28a745;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>👨‍⚕️ Dashboard Bệnh Nhân</h1>
            <div class="user-info">
                <span id="userName">Đang tải...</span>
                <span class="patient-badge">BỆNH NHÂN</span>
                <button class="logout-btn" onclick="logout()">Đăng Xuất</button>
            </div>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div class="dashboard-grid">
            <div class="card">
                <h3>👤 Thông Tin Cá Nhân</h3>
                <div id="personalInfo">
                    <div class="loading">Đang tải thông tin...</div>
                </div>
            </div>

            <div class="card">
                <h3>🩸 Thông Tin Máu</h3>
                <div id="bloodInfo">
                    <div class="loading">Đang tải thông tin...</div>
                </div>
            </div>

            <div class="card">
                <h3>🏥 Thông Tin Y Tế</h3>
                <div id="medicalInfo">
                    <div class="loading">Đang tải thông tin...</div>
                </div>
            </div>
        </div>

        <div class="transfusion-history">
            <h3>💉 Lịch Sử Truyền Máu</h3>
            <div id="transfusionList">
                <div class="loading">Đang tải lịch sử truyền máu...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = (function () {
            if (window.location.protocol.startsWith('http')) {
                return `${window.location.protocol}//${window.location.host}/api`;
            }
            return 'http://localhost:5000/api';
        })();
        let currentUser = null;

        // Check authentication on page load
        document.addEventListener('DOMContentLoaded', function () {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                if (currentUser.role === 'Patient') {
                    loadPatientDashboard();
                } else {
                    showError('Bạn không có quyền truy cập trang này. Vui lòng đăng nhập với tài khoản bệnh nhân.');
                    setTimeout(() => {
                        window.location.href = '/patient-login.htm';
                    }, 3000);
                }
            } else {
                showError('Vui lòng đăng nhập trước!');
                setTimeout(() => {
                    window.location.href = '/patient-login.htm';
                }, 2000);
            }
        });

        // Load patient dashboard data
        async function loadPatientDashboard() {
            try {
                document.getElementById('userName').textContent = currentUser.fullName;

                if (currentUser.patientId) {
                    await loadPatientDetails(currentUser.patientId);
                    await loadTransfusionHistory(currentUser.patientId);
                } else {
                    showError('Không tìm thấy thông tin bệnh nhân. Vui lòng liên hệ quản trị viên.');
                }
            } catch (error) {
                console.error('Error loading dashboard:', error);
                showError('Lỗi khi tải dữ liệu. Vui lòng thử lại sau.');
            }
        }

        // Load patient details
        async function loadPatientDetails(patientId) {
            try {
                const response = await fetch(`${API_BASE}/patients/${patientId}`);
                if (response.ok) {
                    const patient = await response.json();

                    // Personal Info
                    document.getElementById('personalInfo').innerHTML = `
                        <p><strong>Họ tên:</strong> <span class="value">${patient.name || 'Chưa cập nhật'}</span></p>
                        <p><strong>Mã bệnh nhân:</strong> <span class="value">${patient.patientCode || 'Chưa cập nhật'}</span></p>
                        <p><strong>Ngày sinh:</strong> <span class="value">${formatDate(patient.dateOfBirth)}</span></p>
                        <p><strong>Giới tính:</strong> <span class="value">${patient.gender || 'Chưa cập nhật'}</span></p>
                        <p><strong>Số điện thoại:</strong> <span class="value">${patient.phoneNumber || 'Chưa cập nhật'}</span></p>
                        <p><strong>Email:</strong> <span class="value">${patient.email || 'Chưa cập nhật'}</span></p>
                    `;

                    // Blood Info
                    document.getElementById('bloodInfo').innerHTML = `
                        <p><strong>Nhóm máu:</strong> <span class="value">${getBloodTypeName(patient.bloodTypeId)}</span></p>
                        <p><strong>ID nhóm máu:</strong> <span class="value">${patient.bloodTypeId}</span></p>
                    `;

                    // Medical Info
                    document.getElementById('medicalInfo').innerHTML = `
                        <p><strong>Bệnh viện:</strong> <span class="value">${patient.hospital || 'Chưa cập nhật'}</span></p>
                        <p><strong>Khoa/Phòng:</strong> <span class="value">${patient.ward || 'Chưa cập nhật'}</span></p>
                        <p><strong>Ngày nhập viện:</strong> <span class="value">${formatDate(patient.admissionDate)}</span></p>
                        <p><strong>Tình trạng bệnh:</strong> <span class="value">${patient.medicalCondition || 'Chưa cập nhật'}</span></p>
                    `;

                } else {
                    throw new Error('Không thể tải thông tin bệnh nhân');
                }
            } catch (error) {
                console.error('Error loading patient details:', error);
                document.getElementById('personalInfo').innerHTML = '<div class="error">Lỗi khi tải thông tin cá nhân</div>';
                document.getElementById('bloodInfo').innerHTML = '<div class="error">Lỗi khi tải thông tin máu</div>';
                document.getElementById('medicalInfo').innerHTML = '<div class="error">Lỗi khi tải thông tin y tế</div>';
            }
        }

        // Load transfusion history
        async function loadTransfusionHistory(patientId) {
            try {
                const response = await fetch(`${API_BASE}/patients/${patientId}/transfusions`);
                if (response.ok) {
                    const transfusions = await response.json();

                    if (transfusions && transfusions.length > 0) {
                        const transfusionHtml = transfusions.map(transfusion => `
                            <div class="transfusion-item">
                                <div class="transfusion-date">${formatDate(transfusion.transfusionDate)}</div>
                                <div class="transfusion-details">
                                    <strong>Máu:</strong> ${transfusion.blood?.unitNumber || 'N/A'} |
                                    <strong>Lượng:</strong> ${transfusion.quantity}ml |
                                    <strong>Bác sĩ:</strong> ${transfusion.performedBy || 'N/A'} |
                                    <strong>Ghi chú:</strong> ${transfusion.notes || 'Không có'}
                                </div>
                            </div>
                        `).join('');

                        document.getElementById('transfusionList').innerHTML = transfusionHtml;
                    } else {
                        document.getElementById('transfusionList').innerHTML = '<div class="no-data">Chưa có lịch sử truyền máu</div>';
                    }
                } else {
                    document.getElementById('transfusionList').innerHTML = '<div class="error">Không thể tải lịch sử truyền máu</div>';
                }
            } catch (error) {
                console.error('Error loading transfusion history:', error);
                document.getElementById('transfusionList').innerHTML = '<div class="error">Lỗi khi tải lịch sử truyền máu</div>';
            }
        }

        // Logout function
        async function logout() {
            try {
                const response = await fetch(`${API_BASE}/account/logout`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });

                localStorage.removeItem('currentUser');
                currentUser = null;

                // Redirect to login
                window.location.href = '/patient-login.htm';
            } catch (error) {
                console.error('Logout error:', error);
                // Force logout
                localStorage.removeItem('currentUser');
                window.location.href = '/patient-login.htm';
            }
        }

        // Utility functions
        function formatDate(dateString) {
            if (!dateString) return 'Chưa cập nhật';
            const date = new Date(dateString);
            return date.toLocaleDateString('vi-VN');
        }

        function getBloodTypeName(bloodTypeId) {
            const bloodTypes = {
                1: 'O âm (O-)',
                2: 'O dương (O+)',
                3: 'A âm (A-)',
                4: 'A dương (A+)',
                5: 'B âm (B-)',
                6: 'B dương (B+)',
                7: 'AB âm (AB-)',
                8: 'AB dương (AB+)'
            };
            return bloodTypes[bloodTypeId] || 'Chưa xác định';
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
    </script>
</body>

</html>
